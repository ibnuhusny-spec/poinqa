<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POINKU PRO - Sistem Poin Siswa</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; padding-top: 80px; padding-bottom: 50px; }
        #fixedHeader { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; max-width: 28rem; margin: 0 auto; }
        #bottomStatus { position: fixed; bottom: 0; left: 0; right: 0; height: 30px; background: #e5e7eb; z-index: 40; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #6b7280; max-width: 28rem; margin: 0 auto; border-top: 1px solid #d1d5db; cursor: pointer; }
        .btn-3d { transition: all 0.1s; position: relative; transform: translateY(0); border-bottom-width: 4px; border-style: solid; color: white; display: flex; align-items: center; justify-content: center; text-shadow: 0 1px 1px rgba(0,0,0,0.2); cursor: pointer; user-select: none; }
        .btn-3d:active { transform: translateY(4px); border-bottom-width: 0px !important; margin-top: 4px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .btn-blue { background-color: #3b82f6 !important; border-color: #1d4ed8 !important; } 
        .btn-green { background-color: #22c55e !important; border-color: #15803d !important; } 
        .btn-red { background-color: #ef4444 !important; border-color: #b91c1c !important; } 
        .btn-orange { background-color: #f97316 !important; border-color: #c2410c !important; } 
        .btn-gray { background-color: #6b7280 !important; border-color: #374151 !important; } 
        .btn-purple { background-color: #8b5cf6 !important; border-color: #6d28d9 !important; } 
        .list-item-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; margin-bottom: 10px; width: 100%; background-color: white; border: 1px solid; border-bottom-width: 4px; border-radius: 12px; transition: all 0.1s; cursor: pointer; }
        .list-item-card:active { transform: translateY(3px); border-bottom-width: 1px; margin-bottom: 13px; }
        .item-good { border-color: #22c55e; color: #14532d; }
        .item-good .icon-box { background-color: #dcfce7; color: #166534; }
        .item-good .point-badge { background-color: #22c55e; color: white; }
        .item-bad { border-color: #ef4444; color: #7f1d1d; }
        .item-bad .icon-box { background-color: #fee2e2; color: #991b1b; }
        .item-bad .point-badge { background-color: #ef4444; color: white; }
        .icon-box { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .behavior-text { flex: 1; text-align: left; padding: 0 16px; font-weight: 700; font-size: 0.9rem; line-height: 1.3; color: #374151; }
        .point-badge { padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; min-width: 45px; text-align: center; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 12px 0; font-weight: bold; font-size: 0.75rem; border-radius: 8px; transition: all 0.2s; border: 1px solid transparent; position: relative; }
        .tab-active-good { background: #dcfce7; color: #166534; border-color: #22c55e; }
        .tab-active-bad { background: #fee2e2; color: #991b1b; border-color: #ef4444; }
        .tab-active-salat { background: #ccfbf1; color: #115e59; border-color: #14b8a6; } 
        .tab-active-note { background: #dbeafe; color: #1e40af; border-color: #3b82f6; }
        .tab-inactive { background: white; color: #9ca3af; border-color: #e5e7eb; }
        .bg-pattern { background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 24px 24px; }
        ::-webkit-scrollbar { width: 0px; background: transparent; } 
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    <form id="syncForm" method="POST" target="hidden_iframe" style="display:none;">
        <input type="hidden" name="data" id="syncDataInput">
    </form>
    
    <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none" onchange="processExcel(event)">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative overflow-hidden flex flex-col">
        <div id="fixedHeader">
            <button onclick="goBack()" class="text-gray-600 hover:bg-gray-100 p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
            <div class="font-bold text-gray-400 text-sm cursor-pointer" onclick="renderSplash()">POINKU PRO</div>
            <div class="flex gap-1">
                <button onclick="doRefresh()" class="text-blue-500 hover:bg-blue-50 p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
                <button onclick="goHome()" class="text-green-500 hover:bg-green-50 p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-home"></i></button>
                <button onclick="shutdownApp()" class="text-red-500 hover:bg-red-50 p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
        <div id="appContent" class="flex-grow overflow-y-auto"></div>
        <div id="bottomStatus" onclick="forcePull()"><div id="syncDot" class="w-2 h-2 rounded-full bg-green-500 mr-2"></div><span id="syncText">Lokal</span></div>
    </div>

    <script>
        const defaultSchoolData = { name: "6", location: "Nama Sekolah", city: "Kabupaten Maros", logo: "./logo.png", apiUrl: "", teacherPassword: "QA-Poin77", lastUpdate: 0 };
        const initialBehaviors = [
            { id: 1, type: 'plus', label: 'Sholat Dhuha', points: 5, icon: 'fa-person-praying' }, 
            { id: 2, type: 'plus', label: 'Membantu Teman', points: 3, icon: 'fa-hand-holding-heart' },
            { id: 3, type: 'plus', label: 'Hafalan Qur\'an', points: 10, icon: 'fa-book-quran' }, 
            { id: 101, type: 'plus', label: 'Salat Subuh', points: 10, icon: 'fa-cloud-moon' },
            { id: 102, type: 'plus', label: 'Salat Zuhur', points: 10, icon: 'fa-sun' },
            { id: 103, type: 'plus', label: 'Salat Asar', points: 10, icon: 'fa-cloud-sun' },
            { id: 104, type: 'plus', label: 'Salat Magrib', points: 10, icon: 'fa-moon' },
            { id: 105, type: 'plus', label: 'Salat Isya', points: 10, icon: 'fa-star-and-crescent' },
            { id: 106, type: 'plus', label: 'Salat Jumat', points: 15, icon: 'fa-users' },
            { id: 201, type: 'minus', label: 'Tidak Salat Subuh', points: -10, icon: 'fa-cloud-moon' },
            { id: 202, type: 'minus', label: 'Tidak Salat Zuhur', points: -10, icon: 'fa-sun' },
            { id: 203, type: 'minus', label: 'Tidak Salat Asar', points: -10, icon: 'fa-cloud-sun' },
            { id: 204, type: 'minus', label: 'Tidak Salat Magrib', points: -10, icon: 'fa-moon' },
            { id: 205, type: 'minus', label: 'Tidak Salat Isya', points: -10, icon: 'fa-star-and-crescent' },
            { id: 206, type: 'minus', label: 'Tidak Salat Jumat', points: -15, icon: 'fa-users' },
            { id: 4, type: 'minus', label: 'Terlambat', points: -5, icon: 'fa-person-running' }, 
            { id: 5, type: 'minus', label: 'Tidak Mengerjakan PR', points: -10, icon: 'fa-book-open' },
            { id: 6, type: 'minus', label: 'Berkelahi / Gaduh', points: -15, icon: 'fa-user-injured' }
        ];

        let schoolData, students, logs, behaviors, deletedLogIds;
        let currentScreen = 'splash', currentViewedNis = null, tempAddPhoto = "", isStudentModeOnly = false;
        let lastActionTime = 0, spamCounter = 0, debounceTimer, isSyncing = false, pendingSync = false;

        function isSpamDetected() {
            const now = Date.now();
            if (now - lastActionTime < 1500) { spamCounter++; if (spamCounter >= 3) { Swal.fire('Sistem Keamanan', 'Aktivitas tidak wajar terdeteksi. Harap pelan-pelan.', 'warning'); return true; } }
            else { spamCounter = 0; }
            lastActionTime = now; return false;
        }

        function ensureSystemBehaviors() {
            const systemIDs = [101, 102, 103, 104, 105, 106, 201, 202, 203, 204, 205, 206];
            systemIDs.forEach(id => {
                if (behaviors.findIndex(b => String(b.id) === String(id)) === -1) { const newB = initialBehaviors.find(b => String(b.id) === String(id)); if(newB) behaviors.push({...newB}); }
            });
        }

        try {
            schoolData = JSON.parse(localStorage.getItem('schoolData')) || defaultSchoolData;
            if(!schoolData.city) schoolData.city = "Kabupaten Maros"; if(!schoolData.lastUpdate) schoolData.lastUpdate = 0;
            students = JSON.parse(localStorage.getItem('students')) || [];
            logs = JSON.parse(localStorage.getItem('logs')) || [];
            behaviors = JSON.parse(localStorage.getItem('behaviors')) || initialBehaviors;
            deletedLogIds = JSON.parse(localStorage.getItem('deletedLogIds')) || [];
            ensureSystemBehaviors();
        } catch (e) { schoolData = defaultSchoolData; students = []; logs = []; behaviors = initialBehaviors; deletedLogIds = []; }

        function saveData(skipCloud = false) {
            schoolData.lastUpdate = Date.now();
            localStorage.setItem('schoolData', JSON.stringify(schoolData));
            localStorage.setItem('students', JSON.stringify(students));
            localStorage.setItem('logs', JSON.stringify(logs));
            localStorage.setItem('behaviors', JSON.stringify(behaviors));
            localStorage.setItem('deletedLogIds', JSON.stringify(deletedLogIds));
            if (!skipCloud && schoolData.apiUrl) syncToCloud();
        }

        function checkAutoConfig() {
            const params = new URLSearchParams(window.location.search);
            const apiLink = params.get('api'), sName = params.get('school'), sLoc = params.get('loc'), sCity = params.get('city'), mode = params.get('mode'), lockNis = params.get('nis');
            if (mode === 'student_locked' && lockNis) { localStorage.setItem('lockedStudentNis', lockNis); isStudentModeOnly = true; } 
            else if (mode === 'student') { isStudentModeOnly = true; }
            let isUpd = false;
            if (apiLink && apiLink !== schoolData.apiUrl) { schoolData.apiUrl = apiLink; isUpd = true; }
            if (sName && sName !== schoolData.name) { schoolData.name = decodeURIComponent(sName); isUpd = true; }
            if (sLoc && sLoc !== schoolData.location) { schoolData.location = decodeURIComponent(sLoc); isUpd = true; }
            if (sCity && sCity !== schoolData.city) { schoolData.city = decodeURIComponent(sCity); isUpd = true; }
            if (isUpd || mode) { if (isUpd) saveData(true); window.history.replaceState({}, document.title, window.location.pathname); }
        }

        function goHome() { if(currentScreen !== 'splash') { if (localStorage.getItem('lockedStudentNis')) handleAutoLogin(localStorage.getItem('lockedStudentNis')); else if (isStudentModeOnly) renderStudentLogin(); else renderModeSelection(); } }
        function goBack() {
            if (['teacher_detail', 'add_student', 'manage_behaviors', 'setup', 'edit_student'].includes(currentScreen)) renderTeacherDashboard(); 
            else if (['teacher_dashboard'].includes(currentScreen)) renderModeSelection(); 
            else if (currentScreen === 'student_login') { if (isStudentModeOnly) renderSplash(); else renderModeSelection(); }
            else if (currentScreen === 'student_dashboard') { if (localStorage.getItem('lockedStudentNis')) renderSplash(); else renderStudentLogin(); }
            else if (currentScreen === 'mode_selection') renderSplash(); 
        }

        function shutdownApp() { Swal.fire({ title: 'Keluar Aplikasi?', text: "Anda akan kembali ke layar utama.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Ya' }).then((r) => { if (r.isConfirmed) renderSplash(); }); }
        function doRefresh() { if(schoolData.apiUrl) { loadFromCloud(true); } else location.reload(); }

        function updateSyncUI(status) {
            const dot = document.getElementById('syncDot'), txt = document.getElementById('syncText');
            if(status === 'loading') { isSyncing = true; dot.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse"; txt.innerText = "Sync..."; }
            else if(status === 'success') { isSyncing = false; pendingSync = false; dot.className = "w-2 h-2 rounded-full bg-green-500"; txt.innerText = "Online"; }
            else { isSyncing = false; dot.className = "w-2 h-2 rounded-full bg-red-500"; txt.innerText = "Offline"; }
        }

        window.addEventListener('beforeunload', function (e) { if (isSyncing || pendingSync) { e.preventDefault(); e.returnValue = ''; } });

        // =========================================================================
        // SISTEM ATOMIC SYNC (ANTI TABRAKAN / ANTI HILANG)
        // =========================================================================
        function syncToCloud() {
            if(!schoolData.apiUrl) return; clearTimeout(debounceTimer); pendingSync = true; updateSyncUI('loading');
            const lightStudents = students.map(s => { const { photo, studentPhoto, teacherCoverPhoto, studentCoverPhoto, ...sisa } = s; return sisa; });
            const payload = { schoolData, students: lightStudents, logs, behaviors, deletedLogIds };
            
            debounceTimer = setTimeout(() => {
                fetch(schoolData.apiUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ data: JSON.stringify(payload) }), mode: 'no-cors', keepalive: true 
                }).then(() => updateSyncUI('success')).catch(() => {
                    const form = document.getElementById('syncForm'), input = document.getElementById('syncDataInput');
                    if(form && input) { form.action = schoolData.apiUrl; input.value = JSON.stringify(payload); form.submit(); setTimeout(() => updateSyncUI('success'), 1000); }
                });
            }, 300);
        }

        function performAtomicSync(actionCallback, successMsg, uiCallback) {
            if(!schoolData.apiUrl) {
                actionCallback(); saveData(false);
                if(successMsg) Swal.fire('Tersimpan', successMsg, 'success').then(uiCallback); else { if(uiCallback) uiCallback(); }
                return;
            }
            Swal.fire({title: 'Memproses Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            fetch(schoolData.apiUrl + '?action=read&t=' + Date.now()).then(r => r.json()).then(data => {
                let cloudDeleted = data.deletedLogIds || [];
                deletedLogIds = [...new Set([...deletedLogIds, ...cloudDeleted])];

                let logMap = new Map();
                (data.logs || []).forEach(l => logMap.set(l.id, l));
                logs.forEach(l => logMap.set(l.id, l)); 
                logs = Array.from(logMap.values()).filter(l => !deletedLogIds.includes(l.id));

                if(data.students && data.students.length > 0) {
                    students = data.students.map(cloudS => {
                        const localS = students.find(l => String(l.nis) === String(cloudS.nis));
                        return { ...cloudS, photo: localS?.photo || cloudS.photo || "", studentPhoto: localS?.studentPhoto || cloudS.studentPhoto || "", teacherCoverPhoto: localS?.teacherCoverPhoto || cloudS.teacherCoverPhoto || "", studentCoverPhoto: localS?.studentCoverPhoto || cloudS.studentCoverPhoto || "" };
                    });
                }
                if(data.behaviors) behaviors = data.behaviors;
                
                actionCallback(); // Apply action after merge
                saveData(false); // Trigger save and sync
                
                if(successMsg) Swal.fire({title: 'Berhasil!', text: successMsg, icon: 'success', timer: 1500, showConfirmButton: false}).then(uiCallback);
                else { Swal.close(); if(uiCallback) uiCallback(); }
            }).catch(e => {
                actionCallback(); saveData(false);
                if(successMsg) Swal.fire('Tersimpan Lokal', 'Sinyal terputus. Data disimpan di HP.', 'success').then(uiCallback);
                else { Swal.close(); if(uiCallback) uiCallback(); }
            });
        }

        function loadFromCloud(isManual = false) {
            if(!schoolData.apiUrl) return; 
            if(isManual) Swal.fire({title: 'Menyinkronkan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            else updateSyncUI('loading');

            fetch(schoolData.apiUrl + '?action=read&t=' + Date.now()).then(r => r.json()).then(data => {
                let cloudDeleted = data.deletedLogIds || [];
                deletedLogIds = [...new Set([...deletedLogIds, ...cloudDeleted])];

                let logMap = new Map();
                (data.logs || []).forEach(l => logMap.set(l.id, l));
                logs.forEach(l => logMap.set(l.id, l));
                logs = Array.from(logMap.values()).filter(l => !deletedLogIds.includes(l.id));

                if(data.students && data.students.length > 0) {
                    students = data.students.map(cloudS => {
                        const localS = students.find(l => String(l.nis) === String(cloudS.nis));
                        return { ...cloudS, photo: localS?.photo || cloudS.photo || "", studentPhoto: localS?.studentPhoto || cloudS.studentPhoto || "", teacherCoverPhoto: localS?.teacherCoverPhoto || cloudS.teacherCoverPhoto || "", studentCoverPhoto: localS?.studentCoverPhoto || cloudS.studentCoverPhoto || "" };
                    });
                }
                if(data.behaviors) behaviors = data.behaviors;
                if(data.schoolData) {
                    const localTime = schoolData.lastUpdate;
                    schoolData = {...schoolData, ...data.schoolData};
                    if (localTime > (data.schoolData.lastUpdate || 0)) schoolData.lastUpdate = localTime;
                }

                saveData(true); 
                updateSyncUI('success');
                if(isManual) Swal.fire({title:'Sinkronisasi Selesai', icon:'success', timer:1000, showConfirmButton:false}).then(refreshActiveUI); 
                else refreshActiveUI();
            }).catch(e => { 
                if(isManual) Swal.fire('Gagal', 'Koneksi internet error.', 'error'); 
                updateSyncUI('error'); 
            });
        }
        // =========================================================================

        function refreshActiveUI() {
            if(currentScreen === 'teacher_dashboard') renderTeacherDashboard();
            if(currentScreen === 'manage_behaviors') renderManageBehaviors();
            if(currentScreen === 'teacher_detail' && currentViewedNis) renderStudentDetail(currentViewedNis);
            if(currentScreen === 'student_dashboard' && currentViewedNis) {
                const s = students.find(x => String(x.nis).trim() === String(currentViewedNis).trim());
                if(s) renderStudentDashboard(s);
            }
        }

        function compressImage(file, isCover = false) { 
            return new Promise((resolve) => { 
                const reader = new FileReader(); reader.readAsDataURL(file); 
                reader.onload = (event) => { 
                    const img = new Image(); img.src = event.target.result; 
                    img.onload = () => { 
                        const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
                        if(isCover) { const tw = 600; const sc = tw / img.width; canvas.width = tw; canvas.height = img.height * sc; ctx.drawImage(img, 0, 0, canvas.width, canvas.height); } 
                        else { canvas.width = 300; canvas.height = 300; const md = Math.min(img.width, img.height); const sx = (img.width - md) / 2, sy = (img.height - md) / 2; ctx.drawImage(img, sx, sy, md, md, 0, 0, 300, 300); }
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    }; 
                }; 
            }); 
        }

        function formatLogDate(d) { try { const date = new Date(d); if(isNaN(date.getTime())) return d; return date.toLocaleDateString('id-ID', {day: 'numeric', month: 'short'}) + ' ' + date.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}); } catch(e) { return d; } }

        function renderSplash() {
            currentScreen = 'splash'; document.getElementById('fixedHeader').style.display = 'none'; document.getElementById('bottomStatus').classList.add('hidden'); document.body.style.paddingTop = "0";
            let lockedNis = localStorage.getItem('lockedStudentNis'), btnAction = lockedNis ? `handleAutoLogin('${lockedNis}')` : (isStudentModeOnly ? "renderStudentLogin()" : "renderModeSelection()");
            const html = `<div class="h-screen w-full flex flex-col items-center justify-center bg-pattern text-center p-6 fade-in"><div class="w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-xl border-4 border-blue-200 overflow-hidden mb-6 animate-bounce"><img src="${schoolData.logo}" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3209/3209265.png'" class="w-full h-full object-contain p-2"></div><h1 class="text-3xl font-black text-blue-600 mb-2">POINKU PRO</h1><h2 class="text-xl font-bold text-gray-700 mb-1 leading-tight">${schoolData.name}</h2><p class="text-md text-gray-500 mb-8">${schoolData.location}</p><button onclick="${btnAction}" class="btn-3d btn-blue w-full max-w-xs py-4 rounded-xl text-xl font-bold">MULAI APLIKASI</button></div>`;
            document.getElementById('appContent').innerHTML = html;
        }

        function renderModeSelection() {
            currentScreen = 'mode_selection'; document.getElementById('fixedHeader').style.display = 'flex'; document.getElementById('bottomStatus').classList.remove('hidden'); document.body.style.paddingTop = "80px";
            const html = `<div class="flex flex-col items-center justify-center min-h-[70vh] p-6 fade-in"><button onclick="checkTeacherPassword()" class="btn-3d btn-green w-full mb-6 p-6 rounded-2xl flex items-center justify-between shadow-md"><div class="text-left"><span class="block text-2xl font-bold">Mode GURU</span><span class="text-green-100 text-sm">Kelola Data & Poin</span></div><i class="fas fa-chalkboard-user text-4xl opacity-80"></i></button><button onclick="renderStudentLogin()" class="btn-3d btn-orange w-full p-6 rounded-2xl flex items-center justify-between shadow-md"><div class="text-left"><span class="block text-2xl font-bold">Mode MURID</span><span class="text-amber-100 text-sm">Cek Poin & Lapor Salat</span></div><i class="fas fa-user-graduate text-4xl opacity-80"></i></button></div>`; 
            document.getElementById('appContent').innerHTML = html;
        }

        function checkTeacherPassword() { const cp = schoolData.teacherPassword || 'QA-Poin77'; Swal.fire({ title: 'Password Guru', input: 'password', showCancelButton: true, confirmButtonText: 'Masuk', preConfirm: (p) => { if (p === cp) return true; else Swal.showValidationMessage('Password Salah!'); } }).then((r) => { if (r.isConfirmed) renderTeacherDashboard(); }); }

        function renderTeacherDashboard() {
            currentScreen = 'teacher_dashboard'; currentViewedNis = null;
            let listHTML = students.length === 0 ? `<div class="text-center py-10 text-gray-400"><i class="fas fa-users-slash text-4xl mb-2"></i><br>Belum ada data siswa.</div>` : '';
            students.forEach(s => { const tp = logs.filter(l => String(l.studentId) === String(s.nis)).reduce((sum, c) => sum + Number(c.points), 0); const dp = s.photo || 'https://cdn-icons-png.flaticon.com/512/194/194938.png'; listHTML += `<div onclick="renderStudentDetail('${s.nis}')" class="bg-white p-4 rounded-xl shadow border-l-4 ${tp>=0?'border-green-400':'border-red-400'} mb-3 flex justify-between cursor-pointer"><div class="flex items-center gap-3"><div class="w-12 h-12 rounded-full bg-gray-200 overflow-hidden"><img src="${dp}" class="w-full h-full object-cover"></div><div><h3 class="font-bold text-gray-800">${s.name}</h3><p class="text-xs text-gray-500">${s.kelas} | ${s.nis}</p></div></div><div class="font-bold text-xl flex items-center ${tp>=0?'text-green-600':'text-red-500'}">${tp>0?'+':''}${tp}</div></div>`; });

            ws['!cols'] = [{wch: 30}, {wch: 15}, {wch: 10}, {wch: 30}]; XLSX.utils.book_append_sheet(wb, ws, "Template"); XLSX.writeFile(wb, "Template_PoinkuPro.xlsx");
        }

        function downloadBackup() { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({schoolData, students, logs, behaviors, deletedLogIds})); a.download = "Backup_Poin.json"; a.click(); }
        function triggerRestore() { document.getElementById('restoreInput').click(); }
        function handleRestore(e) { const r = new FileReader(); r.onload = (e) => { try { const d = JSON.parse(e.target.result); students = d.students; logs = d.logs; behaviors = d.behaviors; schoolData = d.schoolData; deletedLogIds = d.deletedLogIds || []; saveData(true); location.reload(); } catch(err) { Swal.fire('Error', 'File rusak.', 'error'); } }; r.readAsText(e.target.files[0]); }

        window.onload = function() { checkAutoConfig(); let ln = localStorage.getItem('lockedStudentNis'); if (ln) handleAutoLogin(ln); else { renderSplash(); if(schoolData.apiUrl) setTimeout(() => loadFromCloud(false), 500); } };
    </script>
</body>
</html>
